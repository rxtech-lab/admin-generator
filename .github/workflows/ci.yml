name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race
      - name: Vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  web:
    name: Web package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run --filter '@rxtech-lab/admin-generator-next' build
      - name: Typecheck
        run: bun run --filter '@rxtech-lab/admin-generator-next' typecheck
      - name: Test
        run: bun run --filter '@rxtech-lab/admin-generator-next' test
      - name: Build example app (RSC / directive regression net)
        run: bun run --filter 'web-example' build
        env:
          ADMIN_API_URL: http://localhost:8080

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run --filter '@rxtech-lab/admin-generator-next' build
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      # Root test:e2e builds the app, then Playwright boots the Go API + Next app.
      - name: Run e2e
        run: bun run test:e2e
        env:
          CI: "true"
