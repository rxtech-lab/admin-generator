name: Release NPM Package

on:
  release:
    types: [released]

concurrency: release-${{ github.ref }}

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing via OIDC.

jobs:
  release-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing
        run: npm install --global "npm@^11.5.1"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Typecheck packages
        run: bun run --filter '@rxtech-lab/*' typecheck

      - name: Test packages
        run: bun run test

      # Sets every public package to the release tag version, then publishes
      # through each package's npm trusted-publisher configuration.
      - name: Publish packages to NPM
        run: node scripts/publish.js ${{ github.event.release.tag_name }}
